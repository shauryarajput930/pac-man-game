<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pac-Man Game</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="wrapper">
      <header class="header">
        <h1 class="title">Pac-Man Game</h1>
        <div class="scoreboard">
          <div class="score-label">
            Score:
            <span id="score">0</span>
          </div>
          <div class="high-score-label">
            High Score:
            <span id="highScore">0</span>
          </div>
          <div class="level-label">
            Level:
            <span id="level">1</span>
          </div>
          <div class="lives-label">
            Lives:
            <span id="lives">3</span>
          </div>
          <button id="soundToggle" class="sound-btn">🔊</button>
          <button id="pauseBtn" class="pause-btn">⏸️</button>
          <button id="restartBtn" class="restart-btn">Restart 🔁</button>
        </div>
      </header>

      <main class="game-container">
        <canvas id="gameCanvas" width="560" height="620"></canvas>
        <div class="mobile-controls">
          <button class="control-btn" data-direction="up">↑</button>
        </div>
        <div class="mobile-controls">
          <button class="control-btn" data-direction="left">←</button>
          <button class="control-btn" data-direction="down">↓</button>
          <button class="control-btn" data-direction="right">→</button>
        </div>
        <p class="hint">
          Use arrow keys or WASD to move. Collect all pellets, avoid ghosts!
        </p>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
